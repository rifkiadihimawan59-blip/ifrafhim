<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa - Informatika 2024</title>
    <link rel="stylesheet" href="sytel.css">
</head>
<body>

    <h1 align="center">Data Mahasiswa</h1>

    <p align="center" class="navbar">
        <a href="index.html">Home</a> |
        <a href="Profile.html">Profile</a> |
        <a href="contact.html">Contact</a> |
        <a href="datamahasiswa.html"><b>Data Mahasiswa</b></a>
    </p>

    <div class="content">
        <h2 align="center">Daftar Mahasiswa Terdaftar</h2>
        
        <p align="center">
            Cari Mahasiswa: <input type="text" id="searchInput" onkeyup="cariMahasiswa()" placeholder="Masukkan nama...">
        </p>

        <table align="center" id="tabelMahasiswa" width="100%">
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Kelas</th>
            </tr>
            <tr>
                <td>RIFKI ADI HIMAWAN</td>
                <td>13182420127</td>
                <td>Informatika</td>
            </tr>
            <tr>
                <td>Budi Santoso</td>
                <td>13182420128</td>
                <td>Informatika</td>
            </tr>
        </table>
    </div>

    <script>
    function cariMahasiswa() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toUpperCase();
        let table = document.getElementById("tabelMahasiswa");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[0];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
    </script>

</body>
</html>
