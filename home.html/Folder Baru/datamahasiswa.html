<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa</title>
</head>
<body>

    <h2 align="center">Data Mahasiswa Terdaftar</h2>

    <p align="center">
        Cari Mahasiswa: <input type="text" id="searchInput" onkeyup="cariMahasiswa()" placeholder="Masukkan nama...">
    </p>

    <table align="center" border="1" id="tabelMahasiswa" cellpadding="10" cellspacing="0" width="60%">
        <tr bgcolor="#f2f2f2">
            <th>Nama</th>
            <th>NIM</th>
            <th>Kelas</th>
        </tr>
        <tr>
            <td>RIFKI ADI HIMAWAN</td>
            <td>13182420127</td>
            <td>Informatika</td>
        </tr>
        <tr>
            <td>Budi Santoso</td>
            <td>13182420128</td>
            <td>Informatika</td>
        </tr>
    </table>

    <script>
    function cariMahasiswa() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toUpperCase();
        let table = document.getElementById("tabelMahasiswa");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[0]; // Mencari berdasarkan kolom Nama
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
    </script>

</body>
</html>
